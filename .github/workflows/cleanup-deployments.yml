name: Cleanup Cloudflare Pages Deployments

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点运行
  workflow_dispatch:     # 允许手动触发
    inputs:
      dry_run:
        description: '仅预览，不实际删除'
        required: false
        default: false
        type: boolean
      keep_count:
        description: '保留的部署数量'
        required: false
        default: '10'
        type: string

# 防止并发运行
concurrency:
  group: cleanup-deployments
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Validate environment
        run: |
          if [ -z "${{ secrets.CF_API_TOKEN }}" ]; then
            echo "❌ CF_API_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.CF_ACCOUNT_ID }}" ]; then
            echo "❌ CF_ACCOUNT_ID secret is not set"
            exit 1
          fi
          echo "✅ Environment validation passed"
      
      - name: Run cleanup script
        id: cleanup
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          KEEP_COUNT: ${{ github.event.inputs.keep_count || '10' }}
        run: |
          echo "🚀 Starting Cloudflare Pages deployment cleanup..."
          echo "🔧 Configuration:"
          echo "  - Dry run: $DRY_RUN"
          echo "  - Keep count: $KEEP_COUNT"
          echo ""
          python cleanup_workers.py
      
      - name: Create job summary
        if: always()
        run: |
          echo "## 🧹 Cloudflare Pages 清理摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**运行时间**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**触发方式**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "**模式**: 🔍 预览模式 (未实际删除)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**模式**: 🗑️ 实际删除模式" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**保留数量**: ${{ github.event.inputs.keep_count || '10' }} 个最新部署" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.cleanup.outcome }}" = "success" ]; then
            echo "✅ **状态**: 成功完成" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **状态**: 执行失败" >> $GITHUB_STEP_SUMMARY
          fi